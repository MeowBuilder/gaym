syntax = "proto3";
package Protocol;

import "Enum.proto";
import "Struct.proto";

message C_LOGIN // ลฌ๏ฟฝ๏ฟฝ -> ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ ๏ฟฝฮฑ๏ฟฝ๏ฟฝ๏ฟฝ ๏ฟฝ๏ฟฝรป ๏ฟฝ๏ฟฝลถ
{

}

message S_LOGIN // ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ -> ลฌ๏ฟฝ๏ฟฝ ๏ฟฝฮฑ๏ฟฝ๏ฟฝ๏ฟฝ ๏ฟฝ๏ฟฝ๏ฟฝ ๏ฟฝ๏ฟฝลถ
{
	bool success = 1;
	repeated Player players = 2; // ๏ฟฝ๏ฟฝ๏ฟฝฬต๏ฟฝ ๏ฟฝ฿ฑ๏ฟฝ ๏ฟฝ๏ฟฝ
}

message C_ENTER_GAME // ลฌ๏ฟฝ๏ฟฝ -> ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ ๏ฟฝ๏ฟฝรป ๏ฟฝ๏ฟฝลถ
{
	uint64 playerIndex = 1;
}

message S_ENTER_GAME // ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ -> ลฌ๏ฟฝ๏ฟฝ ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ ๏ฟฝ๏ฟฝลถ
{
	bool success = 1;
	uint64 playerId = 2;
}

message C_CHAT // ลฌ๏ฟฝ๏ฟฝ -> ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ รค๏ฟฝ๏ฟฝ ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ ๏ฟฝ๏ฟฝลถ
{
	string msg = 1;
}

message S_CHAT // ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ -> ลฌ๏ฟฝ๏ฟฝ รค๏ฟฝ๏ฟฝ ๏ฟฝัธ๏ฟฝ๏ฟฝ๏ฟฝ ๏ฟฝ๏ฟฝลถ
{
	uint64 playerId = 1;
	string msg = 2;
}

message S_SPAWN // ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ -> ลฌ๏ฟฝ๏ฟฝ ๏ฟฝรท๏ฟฝ๏ฟฝฬพ๏ฟฝ ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ ๏ฟฝ๏ฟฝรป ๏ฟฝ๏ฟฝลถ
{
	Player player = 1;
}

message S_DESPAWN // ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ -> ลฌ๏ฟฝ๏ฟฝ ๏ฟฝรท๏ฟฝ๏ฟฝฬพ๏ฟฝ ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ ๏ฟฝ๏ฟฝรป ๏ฟฝ๏ฟฝลถ
{
	uint64 playerId = 1;
}

message C_MOVE // ลฌ๏ฟฝ๏ฟฝ -> ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ ๏ฟฝฬต๏ฟฝ ๏ฟฝ๏ฟฝรป ๏ฟฝ๏ฟฝลถ
{
	float x = 1;
	float y = 2;
	float z = 3;
}

message S_MOVE // ๏ฟฝ๏ฟฝ๏ฟฝ๏ฟฝ -> ลฌ๏ฟฝ๏ฟฝ ๏ฟฝรท๏ฟฝ๏ฟฝฬพ๏ฟฝ ๏ฟฝฬต๏ฟฝ ๏ฟฝหธ๏ฟฝ ๏ฟฝ๏ฟฝลถ
{
	uint64 playerId = 1;
	float x = 2;
	float y = 3;
	float z = 4;
}