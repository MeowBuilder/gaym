syntax = "proto3";

package Protocol;

import "Enum.proto";
import "Struct.proto";

message C_LOGIN {
}

message S_LOGIN {
  bool success = 1;
  repeated Player players = 2;
}

message C_ENTER_GAME {
  uint64 playerIndex = 1;
}

message S_ENTER_GAME {
  bool success = 1;
}

message C_CHAT {
  string msg = 1;
}

message S_CHAT {
  uint64 playerId = 1;
  string msg = 2;
}

message S_SPAWN {
  Player player = 1;
}

message S_DESPAWN {
  uint64 playerId = 1;
}

message C_MOVE {
  float x = 1;
  float y = 2;
  float z = 3;
}

message S_MOVE {
  uint64 playerId = 1;
  float x = 2;
  float y = 3;
  float z = 4;
}
