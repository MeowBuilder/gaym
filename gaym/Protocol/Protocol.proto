syntax = "proto3";
package Protocol;

import "Enum.proto";
import "Struct.proto";

message C_LOGIN // 클라 -> 서버 로그인 요청 패킷
{

}

message S_LOGIN // 서버 -> 클라 로그인 결과 패킷
{
	bool success = 1;
	repeated Player players = 2; // 아이디 발급 전
}

message C_ENTER_GAME // 클라 -> 서버 게임 입장 요청 패킷
{
	uint64 playerIndex = 1;
}

message S_ENTER_GAME // 서버 -> 클라 게임 입장 성공 여부 패킷
{
	bool success = 1;
	uint64 playerId = 2;
}

message C_CHAT // 클라 -> 서버 채팅 보내는 패킷
{
	string msg = 1;
}

message S_CHAT // 서버 -> 클라 채팅 뿌리는 패킷
{
	uint64 playerId = 1;
	string msg = 2;
}

message S_SPAWN // 서버 -> 클라 플레이어 생성 요청 패킷
{
	Player player = 1;
}

message S_DESPAWN // 서버 -> 클라 플레이어 제거 요청 패킷
{
	uint64 playerId = 1;
}

message C_MOVE // 클라 -> 서버 이동 요청 패킷
{
	float x = 1; // 현재 위치
	float y = 2;
	float z = 3;
	float dirX = 4;  // 바라보는 방향 
	float dirY = 5; 
	float dirZ = 6;  
}

message S_MOVE // 서버 -> 클라 플레이어 이동 알림 패킷
{
	uint64 playerId = 1;
	float x = 2;        // 이동 후 현재 위치
	float y = 3;
	float z = 4;
	float dirX = 5;     // 바라보는 방향
	float dirY = 6;  
	float dirZ = 7;  
}

message C_SKILL // 클라 -> 서버 스킬 요청 패킷
{
	SkillType skillType = 1; // 스킬 종류
	float x = 2;             // 현재 위치
	float y = 3;
	float z = 4;
	float dirX = 5;          // 바라보는 방향
	float dirY = 6;
	float dirZ = 7;
}

message S_SKILL // 서버 -> 클라 스킬 알림 패킷
{
	uint64 playerId = 1;     // 스킬 사용 플레이어 ID
	SkillType skillType = 2; // 스킬 종류
	float x = 3;             // 스킬 사용 위치
	float y = 4;
	float z = 5;
	float dirX = 6;          // 스킬 사용 방향
	float dirY = 7;
	float dirZ = 8;
}

message C_PORTAL_INTERACT // 클라 -> 서버 포탈 상호작용 요청 패킷
{

}

message C_TORCH_INTERACT // 클라 -> 서버 횃불/전투 시작 상호작용 요청 패킷
{

}

message S_ROOM_TRANSITION // 서버 -> 클라 방 전환 승인/알림 패킷
{
	uint32 stageIndex = 1; // 현재 스테이지 번호
	uint32 roomIndex = 2;  // 현재 방 번호
	bool isBossRoom = 3;   // 보스방 여부
}

message MonsterInfo // 서버 -> 클라 몬스터 기본 정보
{
	uint64 monsterId = 1;   // 몬스터 고유 ID
	uint32 monsterType = 2; // 몬스터 타입
	float x = 3;            // 현재 위치 x
	float y = 4;            // 현재 위치 y
	float z = 5;            // 현재 위치 z
	float yaw = 6;          // 현재 바라보는 회전값
	float hp = 7;           // 현재 HP
	bool isBoss = 8;        // 보스 몬스터 여부
}

message S_MONSTER_SPAWN // 서버 -> 클라 몬스터 생성 알림 패킷
{
	MonsterInfo monster = 1; // 생성할 몬스터 정보
}

message S_MONSTER_MOVE // 서버 -> 클라 몬스터 이동 알림 패킷
{
	uint64 monsterId = 1; // 이동한 몬스터 ID
	float x = 2;          // 현재 위치 x
	float y = 3;          // 현재 위치 y
	float z = 4;          // 현재 위치 z
	float yaw = 5;        // 현재 바라보는 회전값
}

message S_MONSTER_DESPAWN // 서버 -> 클라 몬스터 제거 알림 패킷
{
	uint64 monsterId = 1; // 제거할 몬스터 ID
}

message S_MONSTER_ATTACK // 서버 -> 클라 몬스터 공격 시작 알림 패킷
{
	uint64 monsterId = 1;      // 공격한 몬스터 ID
	uint64 targetPlayerId = 2; // 공격 대상 플레이어 ID
	uint32 attackType = 3;     // 몬스터 공격 타입
	float x = 4;               // 공격 시작 시 몬스터 위치 x
	float y = 5;               // 공격 시작 시 몬스터 위치 y
	float z = 6;               // 공격 시작 시 몬스터 위치 z
	float yaw = 7;             // 공격 시작 시 몬스터 바라보는 회전값
	float windupSec = 8;       // 공격 예고 시간(초), 즉발이면 0
}

message S_PLAYER_DAMAGE // 서버 -> 클라 플레이어 피격/데미지 알림 패킷
{
	uint64 playerId = 1;         // 피해 받은 플레이어 ID
	float damage = 2;            // 이번 공격으로 받은 데미지
	float currentHp = 3;         // 데미지 적용 후 현재 HP
	bool isDead = 4;             // 사망 여부
	uint64 attackerMonsterId = 5; // 공격한 몬스터 ID
}