syntax = "proto3";
package Protocol;

enum PlayerType
{
	PLAYER_TYPE_NONE = 0;
	PLAYER_TYPE_KNIGHT = 1;
	PLAYER_TYPE_MAGE = 2;
	PLAYER_TYPE_ARCHER = 3;
}

enum SkillType
{
	SKILL_TYPE_NONE = 0;           // 기본값(스킬 미사용 상태)
	SKILL_TYPE_Q = 1;              // 플레이어 Q 스킬
	SKILL_TYPE_E = 2;              // 플레이어 E 스킬
	SKILL_TYPE_R = 3;              // 플레이어 R 스킬
	SKILL_TYPE_MOUSE_RIGHT = 4;    // 플레이어 마우스 우클릭 스킬
}